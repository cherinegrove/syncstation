<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SyncStation — Account</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f11; --surface: #18181c; --surface2: #222228;
    --border: #2e2e38; --accent: #ff6b35; --accent2: #ffb347;
    --text: #f0f0f4; --muted: #8888a0;
    --success: #4ade80; --warning: #fbbf24; --error: #f87171;
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 40px; height: 64px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; isolation: isolate; }
  .logo { display: flex; align-items: center; gap: 12px; font-family: 'DM Mono', monospace; font-size: 18px; flex: 1; }
  .logo-icon { width: 32px; height: 32px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
  .header-nav { display: flex; gap: 4px; background: var(--surface2); padding: 4px; border-radius: 8px; border: 1px solid var(--border); position: absolute; left: 50%; transform: translateX(-50%); }
  .header-nav a { text-decoration: none; font-size: 14px; font-weight: 500; padding: 7px 20px; border-radius: 6px; transition: all 0.15s; color: var(--muted); }
  .header-nav a.active { background: var(--bg); color: var(--text); }
  .header-nav a:hover { color: var(--text); }
  .portal-badge { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); background: var(--surface2); padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border); flex: 1; text-align: right; }

  .main { max-width: 900px; margin: 0 auto; padding: 40px 24px; }
  .page-title { font-size: 28px; font-weight: 600; margin-bottom: 6px; }
  .page-subtitle { color: var(--muted); font-size: 15px; margin-bottom: 36px; }

  .plan-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; margin-bottom: 24px; }
  .plan-card.trial    { border-left: 3px solid var(--warning); }
  .plan-card.starter  { border-left: 3px solid var(--success); }
  .plan-card.growth   { border-left: 3px solid #60a5fa; }
  .plan-card.pro      { border-left: 3px solid #a78bfa; }
  .plan-card.business { border-left: 3px solid var(--accent); }
  .plan-card.expired  { border-left: 3px solid var(--error); }
  .plan-card.cancelled  { border-left: 3px solid #888; }
  .plan-card.suspended  { border-left: 3px solid var(--error); }

  .plan-header { display: grid; grid-template-columns: 1fr auto; gap: 24px; align-items: start; margin-bottom: 20px; }
  .plan-name { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
  .plan-desc { color: var(--muted); font-size: 14px; }
  .plan-price { text-align: right; }
  .price-amount { font-family: 'DM Mono', monospace; font-size: 42px; font-weight: 500; color: var(--accent); line-height: 1; }
  .price-period { font-size: 13px; color: var(--muted); }

  .plan-dates { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 20px; padding: 16px; background: var(--surface2); border-radius: 8px; border: 1px solid var(--border); }
  .date-item label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 4px; }
  .date-value { font-family: 'DM Mono', monospace; font-size: 14px; }

  .countdown-large { display: inline-flex; align-items: center; gap: 8px; padding: 6px 14px; border-radius: 20px; font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; }
  .countdown-ok      { background: rgba(74,222,128,0.1); color: var(--success); border: 1px solid rgba(74,222,128,0.3); }
  .countdown-warning { background: rgba(251,191,36,0.15); color: var(--warning); border: 1px solid rgba(251,191,36,0.3); }
  .countdown-danger  { background: rgba(248,113,113,0.1); color: var(--error); border: 1px solid rgba(248,113,113,0.3); }

  .usage-bars { display: flex; flex-direction: column; gap: 12px; }
  .usage-item label { font-size: 12px; color: var(--muted); margin-bottom: 4px; display: flex; justify-content: space-between; }
  .progress { height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; border: 1px solid var(--border); }
  .progress-fill { height: 100%; border-radius: 3px; background: var(--accent); transition: width 0.5s; }
  .progress-fill.warning { background: var(--warning); }
  .progress-fill.danger  { background: var(--error); }

  .alert-banner { border-radius: var(--radius); padding: 14px 20px; margin-bottom: 24px; font-size: 14px; }
  .alert-warning { background: rgba(251,191,36,0.1); border: 1px solid rgba(251,191,36,0.3); color: var(--warning); }
  .alert-error   { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3); color: var(--error); }
  .alert-success { background: rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.3); color: var(--success); }

  .section-title { font-size: 20px; font-weight: 600; margin-bottom: 20px; }
  .tiers-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 40px; }
  .tier-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; position: relative; transition: border-color 0.2s; }
  .tier-card:hover { border-color: #44445a; }
  .tier-card.current { border-color: var(--accent); }
  .tier-card.popular { border-color: #60a5fa; }
  .popular-badge { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: #60a5fa; color: white; font-size: 11px; padding: 2px 10px; border-radius: 20px; white-space: nowrap; }
  .current-badge { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: var(--accent); color: white; font-size: 11px; padding: 2px 10px; border-radius: 20px; white-space: nowrap; }
  .tier-name { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
  .tier-price { font-family: 'DM Mono', monospace; font-size: 32px; font-weight: 500; color: var(--accent); margin-bottom: 4px; }
  .tier-period { font-size: 12px; color: var(--muted); margin-bottom: 16px; }
  .tier-features { list-style: none; margin-bottom: 20px; }
  .tier-features li { font-size: 13px; color: var(--muted); padding: 4px 0; display: flex; align-items: center; gap: 8px; }
  .tier-features li::before { content: '✓'; color: var(--success); font-weight: 600; }
  .btn-upgrade { width: 100%; padding: 10px; border-radius: 8px; border: none; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.15s; }
  .btn-upgrade.primary { background: var(--accent); color: white; }
  .btn-upgrade.primary:hover { background: #ff8555; }
  .btn-upgrade.downgrade { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
  .btn-upgrade.downgrade:hover { border-color: var(--accent); color: var(--text); }
  .btn-upgrade.current-plan { background: var(--surface2); color: var(--muted); cursor: default; border: 1px solid var(--border); }

  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 200; display: none; align-items: center; justify-content: center; padding: 20px; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; width: 100%; max-width: 480px; padding: 32px; }
  .modal-title { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
  .modal-subtitle { color: var(--muted); font-size: 14px; margin-bottom: 24px; }
  .change-summary { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-bottom: 20px; }
  .change-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; font-size: 14px; }
  .change-row:not(:last-child) { border-bottom: 1px solid var(--border); }
  .change-label { color: var(--muted); }
  .change-value { font-family: 'DM Mono', monospace; font-weight: 500; }
  .modal-footer { display: flex; gap: 10px; justify-content: flex-end; padding-top: 20px; border-top: 1px solid var(--border); }
  .btn { padding: 10px 20px; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.15s; border: none; }
  .btn-secondary { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: #ff8555; }
  .error-box { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3); border-radius: 8px; padding: 12px 16px; margin-bottom: 16px; font-size: 14px; color: var(--error); display: none; }
</style>
</head>
<body>

<div class="header">
  <div class="logo"><div class="logo-icon">⇄</div>SyncStation</div>
  <nav class="header-nav">
    <a id="navSettings" href="#">Sync Rules</a>
    <a id="navAccount" href="#" class="active">Account</a>
  </nav>
  <div class="portal-badge" id="portalBadge">Loading...</div>
</div>

<div class="main">
  <div class="page-title">Account & Billing</div>
  <div class="page-subtitle">Manage your SyncStation subscription.</div>

  <div id="alertBanner"></div>

  <div class="plan-card" id="planCard">
    <div class="plan-header">
      <div>
        <div class="plan-name" id="planName">Loading...</div>
        <div class="plan-desc" id="planDesc"></div>
      </div>
      <div class="plan-price">
        <div class="price-amount" id="planPrice">—</div>
        <div class="price-period">per month</div>
      </div>
    </div>
    <div class="plan-dates" id="planDates"></div>
    <div class="usage-bars" id="usageBars"></div>
  </div>

  <div class="section-title">Change Plan</div>
  <div class="tiers-grid" id="tiersGrid"></div>
</div>

<!-- Change Plan Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalInner">
    <div class="modal-title" id="modalTitle">Change Plan</div>
    <div class="modal-subtitle" id="modalSubtitle"></div>
    <div class="error-box" id="errorBox"></div>
    <div class="change-summary" id="changeSummary"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="confirmBtn" onclick="confirmChange()">Confirm Change</button>
    </div>
  </div>
</div>

<script>
  const urlParams = new URLSearchParams(window.location.search);
  const portalId  = urlParams.get('portalId');

  document.getElementById('portalBadge').textContent = 'Portal ' + portalId;
  document.getElementById('navSettings').href = '/settings?portalId=' + portalId;
  document.getElementById('navAccount').href  = '/account?portalId=' + portalId;

  const TIERS = {
    trial:    { name: 'Free Trial',  price: 0,  maxRules: 10,  maxMappings: 10,  desc: '14-day free trial' },
    starter:  { name: 'Starter',     price: 7,  maxRules: 10,  maxMappings: 10,  desc: 'Perfect for small teams' },
    growth:   { name: 'Growth',      price: 12, maxRules: 30,  maxMappings: 30,  desc: 'For growing businesses' },
    pro:      { name: 'Pro',         price: 16, maxRules: 50,  maxMappings: 50,  desc: 'For power users' },
    business: { name: 'Business',    price: 25, maxRules: 100, maxMappings: 100, desc: 'For agencies & enterprise' }
  };

  let currentTier = 'trial';
  let currentUsage = { rules: 0, mappings: 0, maxMappingsPerRule: 0 };
  let selectedTier = '';

  function formatDate(dateStr) {
    if (!dateStr) return '—';
    return new Date(dateStr).toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
  }

  async function load() {
    try {
      const tierRes = await fetch('/account/tier?portalId=' + portalId).then(r => r.json());

      currentTier  = tierRes.tier || 'trial';
      currentUsage = tierRes.usage || { rules: 0, mappings: 0, maxMappingsPerRule: 0 };

      const tierInfo      = TIERS[currentTier] || TIERS.trial;
      const isExpired     = tierRes.isExpired;
      const trialDaysLeft = tierRes.trialDaysLeft || 0;

      // Plan card
      document.getElementById('planCard').className = 'plan-card ' + (isExpired ? 'expired' : currentTier);
      document.getElementById('planName').textContent = isExpired ? 'Trial Expired' : tierInfo.name;
      document.getElementById('planDesc').textContent = tierInfo.desc || '';
      document.getElementById('planPrice').textContent = currentTier === 'trial' ? 'Free' : '$' + tierInfo.price;

      // Dates
      const trialStart  = tierRes.trial_started_at;
      const trialExpiry = trialStart ? new Date(new Date(trialStart).getTime() + 14 * 86400000) : null;

      let countdownHtml = '';
      if (currentTier === 'trial') {
        const days = Math.ceil(trialDaysLeft);
        if (isExpired) {
          countdownHtml = `<span class="countdown-large countdown-danger">⚠ Expired</span>`;
        } else if (days <= 3) {
          countdownHtml = `<span class="countdown-large countdown-danger">⏰ ${days}d left</span>`;
        } else if (days <= 7) {
          countdownHtml = `<span class="countdown-large countdown-warning">⏳ ${days}d left</span>`;
        } else {
          countdownHtml = `<span class="countdown-large countdown-ok">✓ ${days}d left</span>`;
        }
      } else if (!['cancelled','suspended'].includes(currentTier)) {
        countdownHtml = `<span class="countdown-large countdown-ok">✓ Active</span>`;
      }

      document.getElementById('planDates').innerHTML = `
        <div class="date-item"><label>Started</label><div class="date-value">${formatDate(trialStart)}</div></div>
        <div class="date-item"><label>${currentTier === 'trial' ? 'Trial Expires' : 'Plan Since'}</label><div class="date-value">${currentTier === 'trial' ? formatDate(trialExpiry) : formatDate(trialStart)}</div></div>
        <div class="date-item"><label>Status</label><div>${countdownHtml}</div></div>
      `;

      // Alert banners
      const alertBanner = document.getElementById('alertBanner');
      if (isExpired) {
        alertBanner.innerHTML = `<div class="alert-banner alert-error">⚠️ Your free trial has expired. Upgrade below to reactivate SyncStation.</div>`;
      } else if (currentTier === 'trial' && trialDaysLeft <= 3) {
        alertBanner.innerHTML = `<div class="alert-banner alert-warning">⏰ Trial expires in ${Math.ceil(trialDaysLeft)} day(s). Upgrade now to keep your rules active.</div>`;
      } else if (currentTier === 'suspended') {
        alertBanner.innerHTML = `<div class="alert-banner alert-error">🚫 Your account is suspended. Please contact support.</div>`;
      } else if (currentTier === 'cancelled') {
        alertBanner.innerHTML = `<div class="alert-banner alert-error">❌ Your account has been cancelled. Contact support to reactivate.</div>`;
      }

      // Usage bars
      const rulesUsed  = currentUsage.rules;
      const maxRules   = tierInfo.maxRules || 10;
      const maxMapp    = tierInfo.maxMappings || 10;
      const rulesPct   = Math.min(100, (rulesUsed / maxRules) * 100);
      const mappPct    = Math.min(100, (currentUsage.maxMappingsPerRule / maxMapp) * 100);

      document.getElementById('usageBars').innerHTML = `
        <div class="usage-item">
          <label><span>Sync Rules Used</span><span>${rulesUsed} / ${maxRules}</span></label>
          <div class="progress"><div class="progress-fill ${rulesPct >= 100 ? 'danger' : rulesPct >= 80 ? 'warning' : ''}" style="width:${rulesPct}%"></div></div>
        </div>
        <div class="usage-item">
          <label><span>Max Mappings in a Rule</span><span>${currentUsage.maxMappingsPerRule} / ${maxMapp}</span></label>
          <div class="progress"><div class="progress-fill ${mappPct >= 100 ? 'danger' : mappPct >= 80 ? 'warning' : ''}" style="width:${mappPct}%"></div></div>
        </div>
      `;

      // Tier cards
      renderTiers();

    } catch (err) {
      console.error('Load error:', err);
    }
  }

  function renderTiers() {
    const tierOrder = ['starter', 'growth', 'pro', 'business'];
    document.getElementById('tiersGrid').innerHTML = tierOrder.map(t => {
      const info      = TIERS[t];
      const isCurrent = currentTier === t || (currentTier === 'trial' && t === 'starter');
      const isPopular = t === 'growth';
      const isUpgrade = info.price > (TIERS[currentTier]?.price || 0);
      const btnClass  = isCurrent ? 'current-plan' : isUpgrade ? 'primary' : 'downgrade';
      const btnLabel  = isCurrent ? 'Current Plan' : isUpgrade ? '↑ Upgrade' : '↓ Downgrade';

      // Check if downgrade is blocked
      const wouldBlock = !isCurrent && !isUpgrade && (
        currentUsage.rules > info.maxRules ||
        currentUsage.maxMappingsPerRule > info.maxMappings
      );

      return `
        <div class="tier-card ${isCurrent ? 'current' : ''} ${isPopular && !isCurrent ? 'popular' : ''}">
          ${isCurrent ? '<div class="current-badge">Current Plan</div>' : ''}
          ${isPopular && !isCurrent ? '<div class="popular-badge">Most Popular</div>' : ''}
          <div class="tier-name">${info.name}</div>
          <div class="tier-price">$${info.price}</div>
          <div class="tier-period">per month</div>
          <ul class="tier-features">
            <li>${info.maxRules} sync rules</li>
            <li>${info.maxMappings} mappings per rule</li>
            <li>Real-time webhook sync</li>
            <li>All object types</li>
          </ul>
          ${wouldBlock
            ? `<button class="btn-upgrade" style="background:var(--surface2);color:var(--error);border:1px solid rgba(248,113,113,0.3);cursor:not-allowed" title="Reduce your usage first" disabled>⚠ Can't Downgrade</button>`
            : `<button class="btn-upgrade ${btnClass}" onclick="${isCurrent ? '' : `openChange('${t}')`}" ${isCurrent ? 'disabled' : ''}>${btnLabel}</button>`
          }
        </div>
      `;
    }).join('');
  }

  function openChange(tier) {
    selectedTier = tier;
    const newInfo  = TIERS[tier];
    const curInfo  = TIERS[currentTier] || TIERS.trial;
    const isUpgrade = newInfo.price > curInfo.price;

    document.getElementById('modalTitle').textContent    = isUpgrade ? `Upgrade to ${newInfo.name}` : `Downgrade to ${newInfo.name}`;
    document.getElementById('modalSubtitle').textContent = isUpgrade
      ? `You're upgrading your plan. Your new limits will apply immediately.`
      : `You're downgrading your plan. Please make sure you're within the new limits.`;

    document.getElementById('errorBox').style.display = 'none';
    document.getElementById('changeSummary').innerHTML = `
      <div class="change-row"><span class="change-label">From</span><span class="change-value">${curInfo.name} ($${curInfo.price}/mo)</span></div>
      <div class="change-row"><span class="change-label">To</span><span class="change-value">${newInfo.name} ($${newInfo.price}/mo)</span></div>
      <div class="change-row"><span class="change-label">Sync Rules</span><span class="change-value">${curInfo.maxRules} → ${newInfo.maxRules}</span></div>
      <div class="change-row"><span class="change-label">Mappings per Rule</span><span class="change-value">${curInfo.maxMappings} → ${newInfo.maxMappings}</span></div>
      <div class="change-row"><span class="change-label">Your Current Usage</span><span class="change-value">${currentUsage.rules} rules / ${currentUsage.maxMappingsPerRule} max mappings</span></div>
    `;

    document.getElementById('modalOverlay').classList.add('open');
  }

  async function confirmChange() {
    const btn = document.getElementById('confirmBtn');
    btn.textContent = 'Processing...';
    btn.disabled    = true;

    try {
      const res  = await fetch('/account/change-tier', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ portalId, newTier: selectedTier })
      });
      const data = await res.json();

      if (!data.ok || data.blocked) {
        const errBox = document.getElementById('errorBox');
        errBox.textContent    = data.reason || 'Could not change plan. Please try again.';
        errBox.style.display  = 'block';
        btn.textContent       = 'Confirm Change';
        btn.disabled          = false;
        return;
      }

      // Success
      closeModal();
      document.getElementById('alertBanner').innerHTML = `
        <div class="alert-banner alert-success">✅ Your plan has been changed to ${TIERS[selectedTier].name}!</div>
      `;
      currentTier = selectedTier;
      await load();

    } catch (err) {
      const errBox = document.getElementById('errorBox');
      errBox.textContent   = 'An error occurred. Please try again.';
      errBox.style.display = 'block';
      btn.textContent      = 'Confirm Change';
      btn.disabled         = false;
    }
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
    document.getElementById('confirmBtn').textContent = 'Confirm Change';
    document.getElementById('confirmBtn').disabled    = false;
  }

  document.getElementById('modalOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  load();
</script>
</body>
</html>
