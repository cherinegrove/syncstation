<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="/images/favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - SyncStation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'DM Sans', sans-serif;
            background: #0F0F11;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-container {
            background:#18181C;
            border: 1px solid #343543;
            border-radius: 10px;
            max-width: 450px;
            width: 100%;
            padding: 40px;
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo h1 {
            color:#FF6B35;
            font-size: 32px;
            margin-bottom: 8px;
        }
        
        .logo p {
            color: #F0F0F4;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #A9AAB6;
            font-weight: 400;
            font-size: 14px;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            background: #222228;
            border: 1px solid #343543;
            border-radius: 8px;
            color: #A9AAB6;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #FF6B35;
            box-shadow: 0 0 0 3px rgba(255, 107, 53, 0.1);
        }
        
        .checkbox-group {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .checkbox-group input[type="checkbox"] {
            width: auto;
            margin-right: 8px;
        }
        
        .checkbox-group label {
            margin: 0;
            color: #A9AAB6;
            font-size: 14px;
        }
        
        .btn {
            width: 100%;
            padding: 12px;
            background: #FF6B35;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn:hover {
            background: #FF8555;
            transform: translateY(-1px);
            box-shadow: 0 4px 8px rgba(255, 107, 53, 0.3);
        }
        
        .btn:disabled {
            background: #222228;
            color: #A9AAB6;
            border: 1px solid #343543;
            cursor: not-allowed;
            transform: none;
        }
        
        .links {
            margin-top: 20px;
            text-align: center;
        }
        
        .links a {
            color: #FF6B35;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s;
        }
        
        .links a:hover {
            color: #FF8555;
            text-decoration: underline;
        }
        
        .divider {
            text-align: center;
            margin: 20px 0;
            color: #A9AAB6;
            font-size: 14px;
        }
        
        .alert {
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        
        .alert-error {
            background: rgba(255,84,104,0.1);
            color: #FF5468;
            border: 1px solid rgba(255,84,104,0.3);
        }
        
        .alert-success {
            background: rgba(63,208,137,0.1);
            color: #3FD089;
            border: 1px solid rgba(63,208,137,0.3);
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <img src="/images/icon.webp" alt="SyncStation" onerror="this.style.display='none'" style="width:56px;height:56px;border-radius:12px;margin-bottom:12px;">
            <h1>SyncStation</h1>
            <p>Sign in to your account</p>
        </div>

        <div id="alertContainer"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" required autocomplete="email" placeholder="you@company.com">
            </div>
            <div class="form-group">
                <label for="password">
                    Password
                    <a href="/forgot-password" style="float:right;font-weight:400;color:#2563eb;font-size:12px">Forgot password?</a>
                </label>
                <input type="password" id="password" required placeholder="Your password">
            </div>
            <button type="submit" class="btn" id="loginBtn">Sign In</button>
        </form>

        <div class="links">
            <a href="/register">Create an account</a>
        </div>
    </div>

    <script>
        const form       = document.getElementById('loginForm');
        const loginBtn   = document.getElementById('loginBtn');
        const alertBox   = document.getElementById('alertContainer');

        function showAlert(msg, type = 'error') {
            alertBox.innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
        }

        // Show banners from URL params (verified=1, invited, etc.)
        const params = new URLSearchParams(window.location.search);
        if (params.get('verified') === '1') {
            showAlert('Email verified! You can now sign in.', 'success');
        } else if (params.get('invited') === '1') {
            showAlert('You\'ve been invited to a portal. Sign in to accept.', 'info');
        } else if (params.get('error')) {
            showAlert(decodeURIComponent(params.get('error')));
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email    = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            loginBtn.disabled    = true;
            loginBtn.textContent = 'Signing in...';
            alertBox.innerHTML   = '';

            try {
                const res  = await fetch('/api/auth/login', {
                    method:  'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body:    JSON.stringify({ email, password })
                });
                const data = await res.json();

                if (!res.ok) throw new Error(data.error || 'Login failed');

                // ── Routing logic ───────────────────────────────────────────
                // If user has no portals yet, send them to connect HubSpot first
                if (!data.hasPortal) {
                    loginBtn.textContent = 'Redirecting to HubSpot...';
                    showAlert('Account verified! Now connect your HubSpot portal to continue.', 'info');
                    setTimeout(() => {
                        window.location.href = '/oauth/install';
                    }, 1500);
                    return;
                }

                // If user has one portal, go straight to settings
                if (data.portals && data.portals.length === 1) {
                    window.location.href = `/settings?portalId=${data.portalId}`;
                    return;
                }

                // Multiple portals — go to portal picker (or just use first)
                window.location.href = `/settings?portalId=${data.portalId}`;

            } catch (err) {
                showAlert(err.message);
                loginBtn.disabled    = false;
                loginBtn.textContent = 'Sign In';
            }
        });
    </script>
</body>
</html>
