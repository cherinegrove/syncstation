<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password - SyncStation Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f14;
  --surface: #1a1a24;
  --surface2: #25252f;
  --border: #2d2d39;
  --text: #e8e8ed;
  --muted: #9797a7;
  --accent: #ff6b35;
  --success: #4ade80;
  --error: #f87171;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'DM Sans', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 20px;
}

.container {
  width: 100%;
  max-width: 420px;
}

.logo {
  text-align: center;
  margin-bottom: 40px;
}

.logo-icon {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 64px;
  height: 64px;
  background: var(--accent);
  border-radius: 16px;
  font-size: 32px;
  margin-bottom: 16px;
}

.logo-text {
  font-size: 28px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 4px;
}

.logo-subtext {
  font-size: 14px;
  color: var(--muted);
  font-weight: 500;
  letter-spacing: 0.5px;
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 40px;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
}

.card-title {
  font-size: 20px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 8px;
  text-align: center;
}

.card-subtitle {
  font-size: 14px;
  color: var(--muted);
  margin-bottom: 24px;
  text-align: center;
  line-height: 1.5;
}

.form-group {
  margin-bottom: 20px;
}

.form-label {
  display: block;
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 8px;
}

.form-input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 16px;
  font-size: 15px;
  color: var(--text);
  font-family: inherit;
  transition: all 0.2s;
}

.form-input:focus {
  outline: none;
  border-color: var(--accent);
  background: var(--bg);
}

.btn {
  width: 100%;
  background: var(--accent);
  border: none;
  border-radius: 8px;
  padding: 14px 24px;
  font-size: 15px;
  font-weight: 600;
  color: white;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.2s;
  margin-top: 8px;
}

.btn:hover {
  background: #ff7f4d;
  transform: translateY(-1px);
}

.btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}

.message {
  padding: 12px 16px;
  border-radius: 8px;
  font-size: 14px;
  margin-bottom: 20px;
  display: none;
}

.message.show {
  display: block;
}

.message.error {
  background: rgba(248, 113, 113, 0.1);
  border: 1px solid rgba(248, 113, 113, 0.3);
  color: var(--error);
}

.message.success {
  background: rgba(74, 222, 128, 0.1);
  border: 1px solid rgba(74, 222, 128, 0.3);
  color: var(--success);
}

.reset-url {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 16px;
  font-size: 13px;
  word-break: break-all;
  margin-top: 12px;
  font-family: 'DM Mono', monospace;
  color: var(--muted);
}

.copy-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 16px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  cursor: pointer;
  margin-top: 8px;
  width: 100%;
  font-family: inherit;
}

.copy-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
}

.back-link {
  display: block;
  text-align: center;
  margin-top: 20px;
  color: var(--muted);
  text-decoration: none;
  font-size: 14px;
}

.back-link:hover {
  color: var(--text);
}

.btn.loading::after {
  content: '';
  display: inline-block;
  width: 14px;
  height: 14px;
  margin-left: 8px;
  border: 2px solid rgba(255, 255, 255, 0.3);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}
</style>
</head>
<body>

<div class="container">
  <div class="logo">
    <div class="logo-icon">⇄</div>
    <div class="logo-text">SyncStation</div>
    <div class="logo-subtext">ADMIN PORTAL</div>
  </div>

  <div class="card">
    <h1 class="card-title">Forgot Password?</h1>
    <p class="card-subtitle">
      Enter your email address and we'll send you a link to reset your password.
    </p>
    
    <div class="message" id="message"></div>
    
    <form id="forgotForm">
      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input 
          type="email" 
          id="email" 
          class="form-input" 
          placeholder="your@email.com"
          required
        >
      </div>
      
      <button type="submit" class="btn" id="submitBtn">
        Send Reset Link
      </button>
    </form>
    
    <div id="resetUrlContainer" style="display: none;">
      <div class="reset-url" id="resetUrl"></div>
      <button class="copy-btn" onclick="copyResetUrl()">📋 Copy Reset Link</button>
      <p style="font-size: 13px; color: var(--muted); margin-top: 12px; text-align: center;">
        Share this link with the user via email or secure channel
      </p>
    </div>
    
    <a href="/admin/auth/login" class="back-link">← Back to Login</a>
  </div>
</div>

<script>
const form = document.getElementById('forgotForm');
const submitBtn = document.getElementById('submitBtn');
const message = document.getElementById('message');
const emailInput = document.getElementById('email');
const resetUrlContainer = document.getElementById('resetUrlContainer');
const resetUrlEl = document.getElementById('resetUrl');

function showMessage(type, text) {
  message.textContent = text;
  message.className = `message ${type} show`;
}

function hideMessage() {
  message.classList.remove('show');
}

let resetUrl = '';

function copyResetUrl() {
  navigator.clipboard.writeText(resetUrl).then(() => {
    showMessage('success', 'Reset link copied to clipboard!');
  });
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  hideMessage();
  
  const email = emailInput.value.trim();
  
  if (!email.includes('@')) {
    showMessage('error', 'Please enter a valid email address');
    return;
  }
  
  submitBtn.disabled = true;
  submitBtn.classList.add('loading');
  submitBtn.textContent = 'Generating reset link';
  
  try {
    const response = await fetch('/admin/auth/forgot-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });
    
    const data = await response.json();
    
    if (response.ok) {
      form.style.display = 'none';
      resetUrlContainer.style.display = 'block';
      resetUrl = data.resetUrl;
      resetUrlEl.textContent = resetUrl;
      showMessage('success', 'Reset link generated! Copy and share it securely.');
    } else {
      showMessage('error', data.error || 'Failed to generate reset link');
      submitBtn.disabled = false;
      submitBtn.classList.remove('loading');
      submitBtn.textContent = 'Send Reset Link';
    }
  } catch (err) {
    showMessage('error', 'Network error. Please try again.');
    submitBtn.disabled = false;
    submitBtn.classList.remove('loading');
    submitBtn.textContent = 'Send Reset Link';
  }
});

emailInput.focus();
</script>

</body>
</html>
