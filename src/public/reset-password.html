<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - SyncStation</title>
    <link rel="icon" type="image/png" href="/images/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            background: #0F0F11;
            color: #A9AAB6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        h1 {
            text-align: center;
        color: #F0F0F4;
        font-size: 18px;
        margin-bottom: 30px;
        font-weight: 600;
        }
        .card {
            background: #18181C;
            border-radius: 10px;
            border: 1px solid #343543;
            max-width: 450px;
            width: 100%;
            padding: 40px;
        }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo img { width: 150px; height: 112px; margin-bottom: 20px; border-radius: 12px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #F0F0F4; font-weight: 50; font-size: 14px; }
        input {
            width: 100%; padding: 12px 15px; background: #222228; border: 1px solid #343543;
            border-radius: 8px; font-size: 14px; color: #F0F0F4; transition: all 0.3s;
        }
        input:focus { outline: none; border-color: #FF6B35; box-shadow: 0 0 0 3px rgba(255,107,53,0.1); }
        .password-hint { font-size: 12px; color: #A9AAB6; margin-top: 6px; }
        .req-list { margin: 6px 0 0 16px; }
        .req-list li { margin: 3px 0; }
        .req-list li.valid { color: #3FD089; }
        .btn {
            width: 100%; padding: 12px; background: #FF6B35; color: white;
            border: none; border-radius: 8px; font-size: 15px; font-weight: 500;
            cursor: pointer; transition: all 0.3s; margin-top: 4px;
        }
        .btn:hover { background: #FF8555; transform: translateY(-1px); box-shadow: 0 4px 8px rgba(255,107,53,0.3); }
        .btn:disabled { background: #222228; color: #A9AAB6; border: 1px solid #343543; cursor: not-allowed; transform: none; }
        .links { margin-top: 20px; text-align: center; }
        .links a { color: #FF6B35; text-decoration: none; font-size: 13px; font-weight: 500; }
        .links a:hover { color: #FF8555; }
        .alert { padding: 12px 15px; border-radius: 8px; margin-bottom: 20px; font-size: 13px; }
        .alert-error   { background: rgba(255,84,104,0.1); color: #FF5468; border: 1px solid rgba(255,84,104,0.3); }
        .alert-success { background: rgba(63,208,137,0.1); color: #3FD089; border: 1px solid rgba(63,208,137,0.3); }
        .hidden { display: none; }
        .success-container { text-align: center; }
        .success-icon { font-size: 56px; margin-bottom: 20px; }
        .success-container h2 { color: #3FD089; margin-bottom: 12px; font-size: 20px; font-weight: 600; }
        .success-container p { color: #A9AAB6; margin: 16px 0; line-height: 1.6; }
        .btn-success {
            display: inline-block; padding: 12px 32px; background: #FF6B35; color: white;
            border: none; border-radius: 8px; font-size: 14px; font-weight: 500;
            cursor: pointer; text-decoration: none; transition: all 0.3s;
        }
        .btn-success:hover { background: #FF8555; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <img src="/images/icon.webp" alt="SyncStation" onerror="this.style.display='none'">
            <h1>SyncStation</h1>
            <p>Set Your New Password</p>
        </div>

        <div id="alertContainer"></div>

        <div id="resetForm">
            <form id="resetPasswordForm">
                <div class="form-group">
                    <label for="newPassword">New Password</label>
                    <input type="password" id="newPassword" required placeholder="Enter new password">
                    <div class="password-hint">
                        Password must:
                        <ul class="req-list" id="requirements">
                            <li id="req-length">Be at least 8 characters</li>
                            <li id="req-upper">Include an uppercase letter</li>
                            <li id="req-lower">Include a lowercase letter</li>
                            <li id="req-number">Include a number</li>
                        </ul>
                    </div>
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" required placeholder="Confirm new password">
                </div>
                <button type="submit" class="btn" id="submitBtn" disabled>Reset Password</button>
            </form>
            <div class="links"><a href="/login">← Back to Login</a></div>
        </div>

        <div id="successMessage" class="success-container hidden">
            <div class="success-icon">✅</div>
            <h2>Password Reset!</h2>
            <p>Your password has been updated. You can now sign in with your new password.</p>
            <a href="/login" class="btn-success">Go to Login</a>
        </div>
    </div>

    <script>
        const form        = document.getElementById('resetPasswordForm');
        const submitBtn   = document.getElementById('submitBtn');
        const alertContainer = document.getElementById('alertContainer');
        const passInput   = document.getElementById('newPassword');
        const confInput   = document.getElementById('confirmPassword');
        const urlParams   = new URLSearchParams(window.location.search);
        const resetToken  = urlParams.get('token');

        if (!resetToken) {
            alertContainer.innerHTML = '<div class="alert alert-error">Invalid or missing reset token. Please request a new password reset link.</div>';
            submitBtn.disabled = true;
        }

        function showAlert(message, type = 'error') {
            alertContainer.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
        }

        function validatePassword(pw) {
            const ok = { length: pw.length >= 8, upper: /[A-Z]/.test(pw), lower: /[a-z]/.test(pw), number: /[0-9]/.test(pw) };
            document.getElementById('req-length').className = ok.length ? 'valid' : '';
            document.getElementById('req-upper').className  = ok.upper  ? 'valid' : '';
            document.getElementById('req-lower').className  = ok.lower  ? 'valid' : '';
            document.getElementById('req-number').className = ok.number ? 'valid' : '';
            return ok.length && ok.upper && ok.lower && ok.number;
        }

        function checkEnableBtn() {
            submitBtn.disabled = !(validatePassword(passInput.value) && confInput.value && passInput.value === confInput.value);
        }

        passInput.addEventListener('input', checkEnableBtn);
        confInput.addEventListener('input', checkEnableBtn);

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (passInput.value !== confInput.value) { showAlert('Passwords do not match'); return; }
            submitBtn.disabled = true;
            submitBtn.textContent = 'Resetting...';
            alertContainer.innerHTML = '';
            try {
                const response = await fetch('/api/auth/password-reset/reset', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: resetToken, newPassword: passInput.value })
                });
                const data = await response.json();
                if (!response.ok) throw new Error(data.error || 'Failed to reset password');
                document.getElementById('resetForm').classList.add('hidden');
                document.getElementById('successMessage').classList.remove('hidden');
            } catch (error) {
                showAlert(error.message);
                submitBtn.disabled = false;
                submitBtn.textContent = 'Reset Password';
            }
        });
    </script>
</body>
</html>
